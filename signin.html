<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Gushwork</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <header class="header">
        <div class="container">
            <div class="header__wrapper">
                <div class="header__logo">
                    <a href="index.html" class="logo">GUSH<span>WORK</span></a>
                </div>
                <div class="header__actions" style="display: flex; gap: 20px; align-items: center;">
                    <a href="index.html" class="btn btn--text btn--small">&larr; Back to Home</a>
                    <a href="signup.html" class="btn btn--text btn--small">Don't have an account? Sign Up</a>
                </div>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Enter your credentials to access your account</p>
            
            <form class="auth-form" id="signin-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <div class="label-wrapper">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn--primary btn--full">Sign In</button>
                <a href="index.html" class="btn btn--text btn--full" style="margin-top: 10px; text-align: center; font-size: 0.875rem;">&larr; Back to Home</a>
            </form>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <div class="social-auth">
                <button class="btn btn--outline btn--full social-btn">
                    <img src="https://www.google.com/favicon.ico" alt="Google" width="16" height="16">
                    Google
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2024 Gushwork. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
